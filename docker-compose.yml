name: sandlabx

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-database-environment: &database-environment
  POSTGRES_USER: ${POSTGRES_USER:-guacamole_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guacamole_pass}
  POSTGRES_DB: ${POSTGRES_DB:-guacamole_db}

services:
  # Vendor-only schema source. Docker populates the named volume from the
  # version-matched Guacamole image; no SandLabX tables live here.
  guacamole-schema:
    image: guacamole/guacamole:1.5.4
    container_name: sandlabx-guacamole-schema
    restart: "no"
    entrypoint: ["/bin/sh", "-ec"]
    command: >-
      test -d /opt/guacamole/extensions/guacamole-auth-jdbc/postgresql/schema &&
      test -n "$$(find /opt/guacamole/extensions/guacamole-auth-jdbc/postgresql/schema -maxdepth 1 -name '*.sql' -print -quit)" &&
      echo '[guacamole-schema] vendor PostgreSQL schema is available'
    volumes:
      - guacamole-init:/opt/guacamole/extensions/guacamole-auth-jdbc/postgresql/schema
    networks: [sandlabx-network]
    logging: *default-logging

  postgres:
    image: postgres:16
    container_name: sandlabx-postgres
    restart: unless-stopped
    environment: *database-environment
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    stop_grace_period: 30s
    shm_size: 256mb
    networks: [sandlabx-network]
    logging: *default-logging

  # Guacamole owns its vendor schema. This one-shot service initializes a fresh
  # database, no-ops on a complete existing schema, and refuses partial schemas.
  guacamole-db-init:
    image: postgres:16
    container_name: sandlabx-guacamole-db-init
    restart: "no"
    environment:
      <<: *database-environment
      PGPASSWORD: ${POSTGRES_PASSWORD:-guacamole_pass}
    entrypoint: ["/bin/sh", "-ec"]
    command: |
      entity="$$(psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -Atqc "SELECT to_regclass('public.guacamole_entity') IS NOT NULL")"
      connection="$$(psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -Atqc "SELECT to_regclass('public.guacamole_connection') IS NOT NULL")"

      if [ "$${entity}" = "t" ] && [ "$${connection}" = "t" ]; then
        echo '[guacamole-db-init] existing Guacamole schema is complete'
        exit 0
      fi

      if [ "$${entity}" != "f" ] || [ "$${connection}" != "f" ]; then
        echo '[guacamole-db-init] partial Guacamole schema detected; refusing automatic repair' >&2
        exit 1
      fi

      echo '[guacamole-db-init] applying vendor schema'
      for file in /guacamole-schema/*.sql; do
        echo "[guacamole-db-init] applying $${file}"
        psql -v ON_ERROR_STOP=1 -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -f "$${file}"
      done
    volumes:
      - guacamole-init:/guacamole-schema:ro
    depends_on:
      guacamole-schema:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks: [sandlabx-network]
    logging: *default-logging

  # Authoritative SandLabX schema owner. node-pg-migrate applies all pending
  # versions transactionally under an advisory lock, then verifies the result.
  migrate:
    build:
      context: ./backend
    container_name: sandlabx-migrate
    restart: "no"
    entrypoint: ["/bin/sh", "-ec"]
    command: "npm run db:migrate && npm run db:check"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-guacamole_user}:${POSTGRES_PASSWORD:-guacamole_pass}@postgres:5432/${POSTGRES_DB:-guacamole_db}
      SANDLABX_MIGRATION_VERBOSE: ${SANDLABX_MIGRATION_VERBOSE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [sandlabx-network]
    logging: *default-logging

  guacd:
    image: guacamole/guacd:1.5.4
    container_name: sandlabx-guacd
    restart: unless-stopped
    networks: [sandlabx-network]
    logging: *default-logging

  guacamole:
    image: guacamole/guacamole:1.5.4
    container_name: sandlabx-guacamole
    restart: unless-stopped
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRES_HOSTNAME: postgres
      POSTGRES_DATABASE: ${POSTGRES_DB:-guacamole_db}
      POSTGRES_USER: ${POSTGRES_USER:-guacamole_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guacamole_pass}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${GUACAMOLE_PORT:-8081}:8080"
    depends_on:
      guacamole-db-init:
        condition: service_completed_successfully
      guacd:
        condition: service_started
    networks: [sandlabx-network]
    logging: *default-logging

  backend:
    build:
      context: ./backend
    container_name: sandlabx-backend
    restart: unless-stopped
    init: true

    # LEGACY RUNTIME BOUNDARY
    # NET_ADMIN plus KVM/TUN are needed only by the pre-Capsule QemuManager that
    # runs QEMU in the API container. Do not add SYS_ADMIN, privileged mode,
    # host networking, host PID namespace access, or Docker socket mounts here.
    # Remove these grants when QEMU/network execution moves to the dedicated
    # Capsule LocalRunner/QemuNetworkService process.
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/net/tun:/dev/net/tun

    environment:
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-guacamole_user}:${POSTGRES_PASSWORD:-guacamole_pass}@postgres:5432/${POSTGRES_DB:-guacamole_db}
      GUAC_BASE_URL: http://guacamole:8080/guacamole
      VNC_HOST: backend
      STATE_FILE: /app/data/nodes-state.json
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-guacamole_db}
      DB_USER: ${POSTGRES_USER:-guacamole_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-guacamole_pass}
      JWT_SECRET: ${JWT_SECRET:-change-this-development-secret}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      CUSTOM_IMAGES_PATH: /images/custom
      IMAGE_CATALOG_PATH: /images/catalog.json
      OVERLAYS_PATH: /overlays
      VMS_PATH: /vms
      CHECKPOINTS_PATH: /checkpoints

      # LEGACY fixed tap0..tap3 compatibility. The target runner consumes the
      # deterministic PlanCompiler allocations and needs no startup bridge script.
      SANDLABX_NETWORK_MODE: ${SANDLABX_NETWORK_MODE:-legacy-l2}

      # LEGACY image bootstrap is opt-in. Normal startup must not inspect or
      # download every possible image before the API becomes ready.
      SANDLABX_VALIDATE_IMAGES_ON_STARTUP: ${SANDLABX_VALIDATE_IMAGES_ON_STARTUP:-false}
      QEMU_IFUP: /usr/local/libexec/sandlabx/qemu-ifup
      QEMU_IFDOWN: /usr/local/libexec/sandlabx/qemu-ifdown
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${BACKEND_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    stop_grace_period: 30s
    volumes:
      - backend-data:/app/data
      - ./images:/images
      - ./overlays:/overlays
      - ./vms:/vms
      - ./pids:/pids
      - ./checkpoints:/checkpoints
    depends_on:
      migrate:
        condition: service_completed_successfully
      guacamole:
        condition: service_started
    networks: [sandlabx-network]
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_GUAC_URL: ${NEXT_PUBLIC_GUAC_URL:-http://localhost:8081/guacamole}
    container_name: sandlabx-frontend
    restart: unless-stopped
    init: true
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_GUAC_URL: ${NEXT_PUBLIC_GUAC_URL:-http://localhost:8081/guacamole}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks: [sandlabx-network]
    logging: *default-logging

volumes:
  pgdata:
  backend-data:
  guacamole-init:

networks:
  sandlabx-network:
    driver: bridge
