name: CI

on:
  pull_request:
  push:
    branches: [main, dev/**, perf/**]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  startup-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell syntax
        run: |
          bash -n \
            backend/docker-entrypoint.sh \
            backend/init-images.sh \
            backend/setup-network.sh \
            backend/qemu-ifup \
            backend/qemu-ifdown \
            run-all.sh \
            setup-all.sh \
            scripts/stack.sh \
            scripts/network-audit.sh \
            scripts/run-local-backend.sh \
            scripts/stop-all.sh \
            scripts/status.sh \
            scripts/fix-kvm-and-rebuild.sh
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Assert safe network bootstrap
        run: |
          ! grep -Eq 'sysctl|ip_forward|iptables|192\.168\.[12]\.1/' backend/setup-network.sh
          grep -q 'SANDLABX_ALLOW_HOST_NETWORK_SETUP' backend/setup-network.sh

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: sandlabx/backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: sandlabx/frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
